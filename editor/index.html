<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>미술관 메이커 — 에디터</title>
<link rel="stylesheet" href="css/editor.css">
</head>
<body>
  <!-- 상단바 -->
  <header id="topbar">
    <div class="tb-left">
      <span class="logo">🏛 미술관 메이커</span>
      <input id="proj-title" class="proj-title" value="" placeholder="전시 제목">
    </div>
    <div class="tb-right">
      <button id="btn-undo" class="tb-btn" title="실행취소 (Ctrl+Z)">↶</button>
      <button id="btn-redo" class="tb-btn" title="다시실행 (Ctrl+Y)">↷</button>
      <span class="tb-sep"></span>
      <span id="save-state" class="save-state">저장됨</span>
      <button id="btn-openproj" class="tb-btn">프로젝트 열기</button>
      <button id="btn-saveproj" class="tb-btn">프로젝트 저장</button>
      <button id="btn-preview" class="tb-btn primary">▶ 미리보기</button>
      <button id="btn-publish" class="tb-btn accent">↗ Publish</button>
      <input id="proj-file" type="file" accept=".zip" hidden>
    </div>
  </header>

  <!-- 좌측 패널 -->
  <aside id="left-panel">
    <div class="tabs">
      <button class="tab on" data-tab="artwork">작품</button>
      <button class="tab" data-tab="space">공간</button>
    </div>
    <div class="tab-body" id="tab-artwork">
      <section class="panel-block" id="library-root"></section>
      <section class="panel-block" id="inspector-root"></section>
    </div>
    <div class="tab-body" id="tab-space" hidden>
      <section class="panel-block" id="room-props-root"></section>
      <section class="panel-block" id="route-root"></section>
    </div>
  </aside>

  <!-- 중앙 작업영역 -->
  <main id="workarea">
    <div class="mode-switch">
      <button class="mode-btn on" data-mode="plan">평면도</button>
      <button class="mode-btn" data-mode="elevation">정면뷰</button>
      <span class="mode-hint" id="mode-hint"></span>
    </div>
    <div id="canvas-host"></div>
  </main>

  <!-- 우측 패널: Space & Atmosphere -->
  <aside id="right-panel">
    <div class="panel-title">공간 & 분위기</div>
    <div id="atmosphere-root"></div>
  </aside>

  <!-- 하단 룸 스트립 -->
  <footer id="room-strip">
    <div class="strip-scroll" id="strip-scroll"></div>
    <button id="btn-add-room" class="add-room">＋ 룸 추가</button>
  </footer>

  <!-- 토스트 -->
  <div id="toast"></div>

  <script src="../vendor/jszip.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
